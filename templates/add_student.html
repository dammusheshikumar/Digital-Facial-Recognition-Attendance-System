<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register Student Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{ background:#f4f7fb; font-family:'Segoe UI',sans-serif; }
        .main-card{ border:none; border-radius:18px; box-shadow:0 10px 25px rgba(0,0,0,0.08); }
        .page-title{ font-weight:700; color:#0f172a; }
        .section-title{ color:#334155; font-weight:600; }
        .video-box{ border-radius:12px; overflow:hidden; border:2px solid #e2e8f0; background:#000; }
        #video{ width:100%; max-width:600px; transform: scaleX(-1); }
        .progress{ height:18px; border-radius:20px; }
        .btn-custom{ min-width:180px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title">Student Registration</h2>
        <a href="/" class="btn btn-outline-secondary">Dashboard</a>
    </div>

    <div class="card main-card">
        <div class="card-body p-4">
            <h5 class="section-title mb-4">Student Information Metrics</h5>
            
            <form id="studentForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Full Name</label>
                        <input type="text" class="form-control" name="name" placeholder="Enter Full Name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Student ID</label>
                        <input type="text" class="form-control" name="roll" placeholder="Enter Student Id" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Enrollment Number</label>
                        <input type="text" class="form-control" name="reg_no" placeholder="Enrollment No." required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Branch</label>
                        <input type="text" class="form-control" name="class" placeholder="Ex: EEE" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Year</label>
                        <select class="form-select" name="year" required>
                            <option value="" disabled selected>Select Academic Year</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Section</label>
                        <select class="form-select" name="year" required>
                            <option value="" disabled selected>Select Section</option>
                            <option value="1">A</option>
                            <option value="2">B</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Email Address</label>
                        <input type="email" class="form-control" name="email" placeholder="student@email.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Phone Number</label>
                        <input type="text" class="form-control" name="phone" placeholder="+91-xxxxxxxxxx" required>
                    </div>
                </div>

                <div class="mt-4 d-flex flex-wrap gap-2">
                    <button id="saveInfoBtn" type="submit" class="btn btn-primary btn-custom">Save Information</button>
                    <button id="startCaptureBtn" type="button" class="btn btn-warning btn-custom" disabled>Start Face Capture</button>
                    <button id="addStudentBtn" type="button" class="btn btn-success btn-custom" disabled>Complete Registration</button>
                </div>
            </form>

            <hr class="my-4">
            <h5 class="section-title mb-3">Face Dataset Collection Pipeline</h5>

            <div class="text-center">
                <div class="video-box d-inline-block shadow-sm">
                    <video id="video" autoplay muted playsinline></video>
                </div>
                <div class="mt-3 max-width-600 mx-auto">
                    <div id="captureStatus" class="text-muted fw-semibold">Captured 0 / 50</div>
                    <div class="progress mt-2">
                        <div id="progressBar" class="progress-bar bg-success" style="width:0%">0%</div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/camera_add_student.js') }}"></script>
</body>
</html>
